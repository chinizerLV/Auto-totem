name: Build mod jar

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper (if missing)
        run: gradle wrapper --gradle-version 9.5.1 || true

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Locate ClickType class (diagnostic)
        if: always()
        run: find ~/.gradle -iname "*.jar" -exec sh -c 'unzip -l "$1" 2>/dev/null | grep -i click | sed "s|^|$1 -- |"' _ {} \;

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: autototem-jar
          path: build/libs/*.jar

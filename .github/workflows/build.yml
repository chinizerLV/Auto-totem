name: Build mod jar

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Generate Gradle wrapper (if missing)
        run: gradle wrapper --gradle-version 9.5.1 || true

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Dump inventory click API (diagnostic)
        if: always()
        run: |
          mkdir -p /tmp/mcextract
          cd /tmp/mcextract
          JARFILE=$(find ~/.gradle/caches/fabric-loom/26.2 -iname "minecraft-client.jar" | head -1)
          unzip -o -q "$JARFILE" "net/minecraft/world/inventory/ContainerInput*.class" -d /tmp/mcextract || true
          find /tmp/mcextract -name "*.class"
          echo "=== ContainerInput ==="
          for f in /tmp/mcextract/net/minecraft/world/inventory/ContainerInput*.class; do
            echo "--- $f ---"
            javap -p "$f" || true
          done

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: autototem-jar
          path: build/libs/*.jar
